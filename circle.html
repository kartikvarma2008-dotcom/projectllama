<body>

  <main class="circle-page">
    <h1 class="circle-title">draw a circle. kinda.</h1>

    <p class="circle-score">accuracy: <span id="accuracy">—</span>%</p>

    <div class="circle-canvas-wrap">
      <canvas id="draw" width="320" height="320" aria-label="Draw a circle"></canvas>

    <p class="circle-hint" id="hint">draw any loop — doesnt have to be perfect</p>

    <p class="circle-success" id="success" hidden>ok thats a circle. you passed.</p>

    <button type="button" class="choice-btn circle-clear" id="clear-btn" hidden>try again</button>
